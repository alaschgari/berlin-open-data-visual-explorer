name: Sync Berlin Open Data

on:
  schedule:
    # 5 AM UTC = 6 AM CET (winter) / 7 AM CEST (summer)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run data sync
        run: npm run sync

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/processed/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/
          git commit -m "chore: sync Berlin Open Data $(date -u +%Y-%m-%d) [skip ci]"
          git push
